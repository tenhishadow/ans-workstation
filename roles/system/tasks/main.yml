---
- name: Assert | Supported OS
  ansible.builtin.assert:
    that:
      - (ansible_facts.distribution | default('') | lower) is in system_supported_os
    fail_msg: >-
      This role does not support this distribution
      distribution={{ ansible_facts.distribution | default('unknown') }}.
    quiet: true
  tags:
    - always

- name: Vars | include for {{ ansible_facts.distribution | lower }}
  ansible.builtin.include_vars: "{{ item }}"
  loop:
    - "{{ ansible_facts.distribution | lower }}.yml"
    - "{{ ansible_facts.distribution | lower }}-packages.yml"
  tags:
    - pkg

- name: Packages | install
  become: true
  ansible.builtin.package:
    name: "{{ system_packages }}"
    state: present
  tags:
    - pkg

# - name: Time | configure
#   ansible.builtin.include_tasks:
#     file: time.yml

- name: OS-common configuration
  ansible.builtin.include_tasks:
    file: system.yml

- name: OS-related configuration
  ansible.builtin.include_tasks:
    file: "{{ ansible_facts.distribution | lower }}-tasks.yml"

- name: Docker config
  ansible.builtin.include_tasks:
    file: docker.yml
  when:
    - ansible_facts['virtualization_type'] != 'docker'
    - lookup('env', 'CI') != 'true' # for CirleCI

- name: Laptop-related configuration
  ansible.builtin.include_tasks:
    file: laptop.yml
