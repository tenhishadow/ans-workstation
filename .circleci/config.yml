---
version: 2.1

jobs:
  ansible_exec:
    docker:
      - image: archlinux:multilib-devel # checkov:skip=CKV_CIRCLECIPIPELINES_2: archlinux image is intentionally not pinned by digest
    environment:
      ANSIBLE_FORCE_COLOR: "True"
    steps:
      - checkout
      - run:
          name: deps | system | install
          command: >-
            pacman -Sy --noconfirm --needed
            go-task uv git reflector
      - run:
          name: deps | system | configure mirrors
          command: >-
            reflector
            --ipv4
            --protocol https
            --completion-percent 95
            --score 10
            --latest 30
            --fastest 10
            --threads 8
            --connection-timeout 1
            --download-timeout 2
            --save /etc/pacman.d/mirrorlist
      - run:
          name: exec
          command: go-task

workflows:
  ansible_exec:
    jobs:
      - ansible_exec
